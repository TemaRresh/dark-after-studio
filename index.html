<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#09090b" />
  <title>Dark After Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">GENERATIVE IMAGE LAB</p>
        <h1>DARK AFTER STUDIO</h1>
      </div>
      <button id="exportBtn" class="primary" disabled>Сохранить PNG</button>
    </header>

    <section class="workspace">
      <aside class="panel controls">
        <label class="upload" for="fileInput">
          <input id="fileInput" type="file" accept="image/*" hidden />
          <span class="upload-title">Загрузить фотографию</span>
          <span class="upload-subtitle">JPG, PNG, WEBP</span>
        </label>

        <div class="field">
          <label for="columns">Детализация <output id="columnsValue">100</output></label>
          <input id="columns" type="range" min="30" max="220" value="100" />
        </div>

        <div class="field">
          <label for="contrast">Контраст <output id="contrastValue">20</output></label>
          <input id="contrast" type="range" min="-50" max="100" value="20" />
        </div>

        <div class="field">
          <label for="brightness">Яркость <output id="brightnessValue">0</output></label>
          <input id="brightness" type="range" min="-80" max="80" value="0" />
        </div>

        <div class="field">
          <label for="charset">Символы или текст</label>
          <textarea id="charset" rows="3">DARK AFTER</textarea>
        </div>

        <div class="field split">
          <label>Цвет
            <input id="inkColor" type="color" value="#f2f2f2" />
          </label>
          <label>Фон
            <input id="bgColor" type="color" value="#09090b" />
          </label>
        </div>

        <label class="check"><input id="invert" type="checkbox" /> Инвертировать яркость</label>
        <label class="check"><input id="transparent" type="checkbox" /> Прозрачный фон</label>
        <button id="randomBtn" class="secondary" disabled>Случайный вариант</button>
      </aside>

      <section class="canvas-area">
        <div id="emptyState" class="empty-state">
          <div class="empty-mark">DA</div>
          <h2>Загрузи фотографию</h2>
          <p>Выбранный стиль появится здесь, а миниатюры ниже покажут остальные варианты.</p>
        </div>
        <canvas id="mainCanvas" width="1200" height="1200" hidden></canvas>
      </section>
    </section>

    <section class="styles-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">STYLE PREVIEWS</p>
          <h2>Выбери обработку</h2>
        </div>
        <p id="status">Сначала загрузи фотографию</p>
      </div>
      <div id="styleGrid" class="style-grid"></div>
    </section>
  </main>

  <script src="app.js?v=3"></script>
</body>
</html>
