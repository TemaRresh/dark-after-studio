<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#09090b" />
  <title>Dark After Studio</title>
  <link rel="stylesheet" href="styles.css?v=7" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div><p class="eyebrow">GENERATIVE IMAGE LAB</p><h1>DARK AFTER STUDIO</h1></div>
      <div class="header-actions">
        <button id="exportPngBtn" class="primary" disabled>PNG</button>
        <button id="exportSvgBtn" class="secondary compact" disabled>SVG</button>
        <button id="exportVideoBtn" class="primary" disabled hidden>Видео</button>
      </div>
    </header>

    <nav class="mode-tabs" aria-label="Режим">
      <button class="mode-tab active" data-mode="photo">Фото</button>
      <button class="mode-tab" data-mode="video">Видео</button>
    </nav>

    <section class="workspace">
      <aside class="panel controls">
        <label class="upload" for="fileInput">
          <input id="fileInput" type="file" accept="image/jpeg,image/png,image/webp,image/gif" hidden />
          <span class="upload-title">Загрузить фотографию</span>
          <span class="upload-subtitle">JPG, PNG, WEBP</span>
        </label>

        <div id="commonControls">
          <div class="field"><label for="columns">Детализация <output id="columnsValue">100</output></label><input id="columns" type="range" min="30" max="220" value="100" /></div>
          <div class="field"><label for="effect">Сила эффекта <output id="effectValue">55</output></label><input id="effect" type="range" min="0" max="100" value="55" /></div>
          <div class="field"><label for="structure">Размер структуры <output id="structureValue">45</output></label><input id="structure" type="range" min="5" max="100" value="45" /></div>
          <div class="field"><label for="contrast">Контраст <output id="contrastValue">20</output></label><input id="contrast" type="range" min="-50" max="100" value="20" /></div>
          <div class="field"><label for="brightness">Яркость <output id="brightnessValue">0</output></label><input id="brightness" type="range" min="-80" max="80" value="0" /></div>
          <div class="field"><label for="charset">Символы или текст</label><textarea id="charset" rows="3">DARK AFTER</textarea></div>
          <div class="field split"><label>Цвет<input id="inkColor" type="color" value="#f2f2f2" /></label><label>Фон<input id="bgColor" type="color" value="#09090b" /></label></div>
          <label class="check"><input id="invert" type="checkbox" /> Инвертировать яркость</label>
          <label class="check"><input id="transparent" type="checkbox" /> Прозрачный фон</label>
          <button id="randomBtn" class="secondary" disabled>Новый вариант</button>
          <div class="modifier-panel">
            <p class="eyebrow modifier-title">MODIFIERS</p>
            <label class="check"><input id="modGlow" type="checkbox" /> Glow</label>
            <label class="check"><input id="modGrain" type="checkbox" /> Grain</label>
            <label class="check"><input id="modRgb" type="checkbox" /> RGB Ghost</label>
            <label class="check"><input id="modOutline" type="checkbox" /> Outline</label>
            <label class="check"><input id="modVignette" type="checkbox" /> Vignette</label>
            <div class="field"><label for="modifierAmount">Сила модификаторов <output id="modifierAmountValue">45</output></label><input id="modifierAmount" type="range" min="0" max="100" value="45" /></div>
          </div>
        </div>

        <div id="videoControls" hidden>
          <div class="field"><label for="animation">Анимация</label><select id="animation">
            <optgroup label="Анимация букв">
              <option value="recognition">RECOGNITION ENGINE</option>
              <option value="letterDrift">LETTER DRIFT</option>
              <option value="letterEcho">LETTER ECHO</option>
              <option value="letterWind">LETTER WIND</option>
              <option value="letterPulse">LETTER PULSE</option>
              <option value="letterFlicker">LETTER FLICKER</option>
              <option value="letterAssemble">LETTER ASSEMBLE</option>
              <option value="letterCollapse">LETTER COLLAPSE</option>
            </optgroup>
            <optgroup label="Общие">
              <option value="signal">SIGNAL</option><option value="assemble">ASSEMBLE</option>
              <option value="decay">DECAY</option><option value="scanner">SCANNER</option>
              <option value="rgbPulse">RGB PULSE</option><option value="glitchStorm">GLITCH STORM</option>
              <option value="breathing">BREATHING</option>
            </optgroup>
          </select></div>
          <div class="field"><label for="duration">Длительность <output id="durationValue">5</output> с</label><input id="duration" type="range" min="2" max="12" value="5" /></div>
          <div class="field"><label for="speed">Скорость <output id="speedValue">100</output>%</label><input id="speed" type="range" min="30" max="220" value="100" /></div>
          <div class="field"><label for="format">Формат</label><select id="format"><option value="vertical">TikTok 9:16</option><option value="square">Квадрат 1:1</option><option value="original">Как фото</option></select></div>
          <label class="check"><input id="loop" type="checkbox" checked /> Бесшовный цикл</label>
          <button id="playBtn" class="secondary" disabled>Запустить превью</button>

          <div class="audio-panel">
            <p class="eyebrow modifier-title">AUDIO REACTIVE</p>
            <label class="upload audio-upload" for="audioInput">
              <input id="audioInput" type="file" accept="audio/*" hidden />
              <span class="upload-title">Загрузить песню</span>
              <span id="audioFileName" class="upload-subtitle">MP3, M4A, WAV</span>
            </label>
            <audio id="audioPlayer" controls preload="metadata"></audio>
            <label class="check"><input id="audioReactive" type="checkbox" checked /> Реакция на музыку</label>
            <div class="audio-meters">
              <div><span>LOW</span><i id="bassMeter"></i></div>
              <div><span>MID</span><i id="midMeter"></i></div>
              <div><span>HIGH</span><i id="highMeter"></i></div>
            </div>
            <div class="field"><label for="bassSensitivity">Бас → сдвиг строк <output id="bassSensitivityValue">70</output></label><input id="bassSensitivity" type="range" min="0" max="150" value="70" /></div>
            <div class="field"><label for="midSensitivity">Середина → распознавание <output id="midSensitivityValue">90</output></label><input id="midSensitivity" type="range" min="0" max="150" value="90" /></div>
            <div class="field"><label for="highSensitivity">Высокие → мерцание <output id="highSensitivityValue">75</output></label><input id="highSensitivity" type="range" min="0" max="150" value="75" /></div>
            <div class="field"><label for="recognitionBase">Базовое распознавание <output id="recognitionBaseValue">35</output>%</label><input id="recognitionBase" type="range" min="0" max="100" value="35" /></div>
            <label class="check"><input id="syncAudio" type="checkbox" checked /> Запускать трек вместе с превью</label>
          </div>
          <p class="control-note">При экспорте звук добавляется, если браузер поддерживает запись аудиодорожки.</p>
        </div>
      </aside>

      <section class="canvas-area">
        <div id="emptyState" class="empty-state"><div class="empty-mark">DA</div><h2>Загрузи фотографию</h2><p>Фото и видео создаются локально в браузере.</p></div>
        <canvas id="mainCanvas" width="1200" height="1200" hidden></canvas>
        <canvas id="videoCanvas" width="720" height="1280" hidden></canvas>
        <div id="recordingBadge" class="recording-badge" hidden>REC</div>
      </section>
    </section>

    <section class="styles-section">
      <div class="section-heading"><div><p class="eyebrow">STYLE PREVIEWS</p><h2>Выбери основу</h2></div><p id="status">Сначала загрузи фотографию</p></div>
      <div id="styleGrid" class="style-grid"></div>
    </section>
  </main>
  <script src="app.js?v=7"></script>
</body>
</html>
